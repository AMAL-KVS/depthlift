name: depthlift
description: >
  Convert any 2D image into a live 3D parallax scene with on-device depth
  estimation. Inspired by iOS depth effects.
version: 0.1.0
homepage: https://github.com/yourusername/depthlift

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^6.0.0
  tflite_flutter: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.depthlift
        pluginClass: DepthLiftPlugin
      ios:
        pluginClass: DepthLiftPlugin
  assets:
    - assets/models/
